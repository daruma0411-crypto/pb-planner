<!DOCTYPE html>
<html lang="ja">
<head><meta charset="utf-8"><title id="page_title">レポート — PB企画プランナー</title>
<style>
body { font-family: -apple-system, "Segoe UI", "Yu Gothic", sans-serif; max-width: 960px; margin: 2em auto; padding: 0 1em; color: #222; }
.toolbar { display: flex; gap: 0.5em; align-items: center; flex-wrap: wrap; margin: 1em 0; }
.status { padding: 0.4em 0.8em; background: #ffd; border-radius: 4px; }
button, a.btn { padding: 0.5em 1em; background: #2a7; color: #fff; border: 0; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 0.95em; }
button:disabled { background: #aaa; cursor: not-allowed; }
.btn-print { background: #555; }
.btn-next { background: #c63; }
#report { background: #fff; padding: 1.5em; border: 1px solid #ddd; border-radius: 6px; font-size: 1em; line-height: 1.7; }
#report h1 { border-bottom: 2px solid #333; padding-bottom: 0.3em; font-size: 1.6em; }
#report h2 { border-bottom: 1px solid #888; padding-bottom: 0.2em; margin-top: 1.5em; font-size: 1.3em; }
#report h3 { margin-top: 1.2em; font-size: 1.1em; }
#report table { border-collapse: collapse; width: 100%; margin: 0.8em 0; }
#report th, #report td { border: 1px solid #666; padding: 0.4em 0.6em; text-align: left; }
#report th { background: #eee; }
#report code { background: #f4f4f4; padding: 0.1em 0.3em; border-radius: 3px; }
#report pre { background: #f4f4f4; padding: 0.6em; border-radius: 4px; overflow-x: auto; }
mark.hl { background: #fff4f0; color: #c4263a; padding: 0.1em 0.25em; border-radius: 3px; font-weight: bold; border-bottom: 2px solid #c4263a; }
.hl-card { background: #fff8f5; border: 2px solid #c4763a; border-radius: 8px; padding: 1em 1.4em; margin: 1.5em 0; }
.hl-card-title { font-size: 1.05em; font-weight: bold; color: #c4763a; margin-bottom: 0.6em; }
.hl-list { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8em; }
.hl-item { background: #fff; border-left: 4px solid #c4263a; padding: 0.6em 0.9em; border-radius: 4px; }
.hl-no { display: inline-block; background: #c4263a; color: #fff; border-radius: 50%; width: 1.5em; height: 1.5em; text-align: center; line-height: 1.5em; font-weight: bold; margin-bottom: 0.4em; }
.hl-label { font-weight: bold; font-size: 1em; color: #1f3a5f; margin-bottom: 0.3em; }
.hl-desc { font-size: 0.85em; color: #444; line-height: 1.6; }
.hl-note { font-size: 0.8em; color: #888; margin-top: 0.6em; margin-bottom: 0; }
@media (max-width: 700px) { .hl-list { grid-template-columns: 1fr; } }
@media print {
  body { max-width: 100%; margin: 0; padding: 0; color: #000; }
  .toolbar, .nav { display: none !important; }
  #report { border: none; padding: 0; }
  #report h1 { page-break-before: avoid; }
  #report h2 { page-break-before: auto; page-break-after: avoid; }
  #report h3, #report h4 { page-break-after: avoid; }
  table { page-break-inside: avoid; }
  @page { size: A4; margin: 16mm; }
}
</style>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<p class="nav"><a href="/projects" style="color:#666;text-decoration:none">← 案件一覧</a></p>
<h1 id="phase_title">レポート</h1>
<div class="toolbar">
  <span class="status" id="status">確認中...</span>
  <button id="md_btn" disabled>Markdown ダウンロード</button>
  <button id="html_btn" disabled>HTML ダウンロード</button>
  <button class="btn-print" onclick="window.print()">ブラウザで印刷 (PDF 化)</button>
  <a id="next_btn" class="btn btn-next" style="display:none">次のフェーズへ →</a>
</div>
<div id="report"></div>
<script>
const PHASE_INFO = {
  '3c': { title: '3C 分析', api: '3c', next: 'ksf', next_label: 'KSF へ' },
  'ksf': { title: 'KSF 抽出', api: 'ksf', next: 'stp', next_label: 'STP へ' },
  'stp': { title: 'STP 設計', api: 'stp', next: '4p', next_label: '4P へ' },
  '4p': { title: '4P 設計', api: '4p', next: 'finish', next_label: 'キャッチ+マスタへ' },
  'finish': { title: 'キャッチ + 商品マスタ', api: 'finish', next: null, next_label: null },
};
const HIGHLIGHTS = {
  '3c': [
    { keyword: '100L クラスの引き合いが直近 12 ヶ月で 1.4 倍に伸長', label: '🎯 POS 実データ駆動の市場機会発見',
      desc: 'アズワン社内 POS の生数値 (1.4 倍) を引き、「¥90-110 万に PB を降ろせばボリューム化」という具体ターゲットを定量根拠で導いた。一般的な「成熟市場」記述で止まらない。' },
    { keyword: 'データ可搬性 / GMP IQ-OQ / 多言語 / サブスク', label: '🎯 全社網羅の空白地帯確定',
      desc: 'スクレイピング 101 件を網羅的に読み「いずれのメーカーデータにも見当たらず」と 4 軸を一気に業界空白として確定。データから「無いこと」を発見するのは AI ならでは。' },
  ],
  'ksf': [
    { keyword: '× 未解決(業界空白)', label: '🎯 NB 現状解決度を可視化',
      desc: 'ペイン表に「NB(FLS-1000)の現状解決度」列を追加し、× 未解決 / △ 部分対応 / ○ NB satisfy 済を明示。PB 差別化余地★★★を機械的に算出して優先順位付け。' },
    { keyword: 'NB が未解決のペインを優先列挙', label: '🎯 ハルシネーション抑止の自己宣言',
      desc: '「人間工学系ペインは NB satisfy 済前提として強度を下方修正」を明文化。AI が自分の判定基準を晒すことで透明性確保、後段の意思決定者が監査可能に。' },
  ],
  'stp': [
    { keyword: '滅菌記録の外部要件強度', label: '🎯 軸の発明：NB 弱点軸×購買行動軸',
      desc: '既存の「組織タイプ × 容量」軸を捨て「滅菌記録要件 × 消耗品月次回転」という NB 弱点と購買行動の組合せに再設計。S5 食品検査 / S8 バイオベンチャーが最優先で浮上。' },
    { keyword: 'PB は「価格 -20%」のみでは独自性が弱く、優先順位を落とす', label: '🎯 最大ボリュームを意図的に外す判断',
      desc: '大学 (S7) は最大ボリュームだが NB(HVA-110LB ¥742K 等) が同軸訴求済みで「価格だけでは勝てない」と判定、優先度を下げる。データ駆動で「勝てない戦場を選ばない」を明示。' },
  ],
  '4p': [
    { keyword: '価格谷間 ¥850K 帯', label: '🎯 価格谷間「中央突破」ポジショニング',
      desc: 'NB 全社の価格表から ¥742K(yamato) と ¥980K(tomys LPS) の谷 ¥850K 帯を発見し、PB-FS100 ¥864K を投入。機能で ¥742K に勝ち、価格で ¥980K に勝つ二面攻撃。' },
    { keyword: '本体 + サブスク 24 ヶ月 LTV 粗利', label: '🎯 LTV ベースの粗利設計',
      desc: 'ハード単発粗利 21.8% にサブスク LTV を加算して 28.7%(24 ヶ月)。「機器売り切り」から「LTV 最大化」へモデル転換、消耗品サブスクで継続収益を定量化。' },
  ],
  'finish': [],
};
function applyHighlights(phase) {
  const list = HIGHLIGHTS[phase] || [];
  if (list.length === 0) return;
  const reportEl = document.getElementById('report');
  let html = reportEl.innerHTML;
  for (const { keyword } of list) {
    // mark で囲む（1 件目のみ置換）
    const escKw = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp('(' + escKw + ')', '');
    if (re.test(html)) {
      html = html.replace(re, '<mark class="hl">$1</mark>');
    }
  }
  reportEl.innerHTML = html;
}
function renderHighlightCard(phase) {
  const list = HIGHLIGHTS[phase] || [];
  if (list.length === 0) return '';
  const items = list.map((h, i) =>
    `<div class="hl-item"><div class="hl-no">${i+1}</div>` +
    `<div class="hl-label">${h.label}</div>` +
    `<div class="hl-desc">${h.desc}</div></div>`
  ).join('');
  return `<div class="hl-card">
    <div class="hl-card-title">🌟 このレポートの「おー」ポイント</div>
    <div class="hl-list">${items}</div>
    <p class="hl-note">↓ 本文中で <mark class="hl">赤字ハイライト</mark> されている箇所を参照</p>
  </div>`;
}
const params = new URLSearchParams(location.search);
const phase = params.get('phase') || '3c';
const info = PHASE_INFO[phase] || PHASE_INFO['3c'];
const pid = location.pathname.split('/')[2];
document.title = info.title + ' — PB企画プランナー';
document.getElementById('phase_title').textContent = info.title;
document.getElementById('page_title').textContent = info.title + ' — PB企画プランナー';
// 「光るポイント」解説カードをタイトル直下に挿入
(function injectHlCard() {
  const card = renderHighlightCard(phase);
  if (card) {
    const h1 = document.getElementById('phase_title');
    h1.insertAdjacentHTML('afterend', card);
  }
})();
let reportId = null;
let mdAccum = "";

function _activateDownloads(rid) {
  reportId = rid;
  ['md_btn','html_btn'].forEach(id => document.getElementById(id).disabled = false);
  document.getElementById('md_btn').onclick = () => location.href = `/api/projects/${pid}/reports/${rid}/md`;
  document.getElementById('html_btn').onclick = () => location.href = `/api/projects/${pid}/reports/${rid}/html`;
  if (info.next) {
    const nb = document.getElementById('next_btn');
    nb.style.display = 'inline-block';
    nb.textContent = info.next_label + ' →';
    nb.href = `/projects/${pid}/report?phase=${info.next}`;
  }
}

async function loadExistingOrStart() {
  // 既存レポートがあれば表示のみ、無ければ即生成開始
  try {
    const phRes = await fetch(`/api/projects/${pid}/phases`);
    if (phRes.ok) {
      const phData = await phRes.json();
      const list = (phData.phases || {})[info.api] || [];
      if (list.length > 0) {
        const rid = list[list.length - 1];
        const mdRes = await fetch(`/api/projects/${pid}/reports/${rid}/md`);
        if (mdRes.ok) {
          const md = await mdRes.text();
          document.getElementById('report').innerHTML = marked.parse(md);
          applyHighlights(phase);
          document.getElementById('status').textContent = '✓ 完了（既存）';
          _activateDownloads(rid);
          return;
        }
      }
    }
  } catch (e) { console.warn('既存確認失敗', e); }
  // 既存なし → 新規生成
  await start();
}

async function start() {
  document.getElementById('status').textContent = '生成中...';
  const body = phase === '3c' ? { base_model: JSON.parse(sessionStorage.getItem('base_model') || '{}') } : {};
  const resp = await fetch(`/api/projects/${pid}/reports/${info.api}`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  });
  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let buf = "";
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    let idx;
    while ((idx = buf.indexOf('\n\n')) >= 0) {
      const line = buf.slice(0, idx).trim();
      buf = buf.slice(idx + 2);
      if (line.startsWith('data:')) {
        try {
          const payload = JSON.parse(line.slice(5).trim());
          if (payload.error) {
            document.getElementById('status').textContent = 'エラー: ' + payload.error;
            return;
          }
          if (payload.text) {
            if (payload.text.startsWith('[META]')) {
              reportId = payload.text.replace('[META]', '').trim();
            } else {
              mdAccum += payload.text;
              document.getElementById('report').innerHTML = marked.parse(mdAccum);
            }
          }
          if (payload.done) {
            applyHighlights(phase);
            document.getElementById('status').textContent = '✓ 完了';
            if (reportId) _activateDownloads(reportId);
          }
        } catch (e) { console.warn(e); }
      }
    }
  }
}
loadExistingOrStart();
</script>
</body>
</html>
