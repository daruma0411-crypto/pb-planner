<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PB企画支援 | アズワンPBプランナー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css?v=20260318d">
</head>
<body>
<div class="app">

  <!-- ヘッダー -->
  <header>
    <div class="header-logo">📋</div>
    <div class="header-title">
      <h1>PB企画プランナー <span class="beta-badge">BETA</span></h1>
      <p class="subtitle">仕入れ先製品データからPB企画をAIと壁打ち</p>
    </div>
    <div class="header-actions">
      <button id="btn-reset-all" class="btn-reset" title="リセット">🔄 リセット</button>
    </div>
  </header>

  <!-- メインコンテナ（2パネル） -->
  <div class="main-container">

    <!-- 左パネル: チャット -->
    <div class="chat-panel">
      <div class="chat-messages" id="chat-messages">
        <div class="welcome-message">
          <div class="welcome-icon">🏭</div>
          <h2>PB企画を始めましょう</h2>
          <p>仕入れ先の製品を選んで、PB化の企画をAIと一緒に進められます。</p>
          <div class="quick-start">
            <button class="quick-btn" onclick="fillExample('トミー精工のオートクレーブでPB企画したい')">🔬 トミー精工 オートクレーブ</button>
            <button class="quick-btn" onclick="fillExample('メディカル用途のオートクレーブを探して')">🏥 メディカル用オートクレーブ</button>
            <button class="quick-btn" onclick="fillExample('ラボ用の大容量オートクレーブを検索')">🧪 ラボ用 大容量</button>
          </div>
        </div>
      </div>
      <div class="chat-input-area">
        <div class="chat-input-row">
          <textarea id="chat-input" placeholder="PB企画について質問・相談..." rows="1"></textarea>
          <button id="btn-send" class="btn-send" title="送信">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- 右パネル: PBカード + フレームワーク + アウトプット -->
    <div class="dashboard-panel" id="dashboard">

      <!-- PB企画カード -->
      <div class="dashboard-section">
        <div class="section-header">
          <span class="section-icon">📋</span>
          <span class="section-title">PB企画カード</span>
          <span class="progress-badge" id="pb-progress">0/7</span>
        </div>
        <div class="pb-card" id="pb-card">
          <div class="pb-row" data-field="asone_part_no">
            <span class="pb-label">アズワン品番</span>
            <span class="pb-value" id="pb-asone_part_no">—</span>
          </div>
          <div class="pb-row" data-field="price">
            <span class="pb-label">販売価格</span>
            <span class="pb-value" id="pb-price">—</span>
          </div>
          <div class="pb-row" data-field="jan_code">
            <span class="pb-label">JANコード</span>
            <span class="pb-value" id="pb-jan_code">—</span>
          </div>
          <div class="pb-row" data-field="maker_part_no">
            <span class="pb-label">メーカー型番</span>
            <span class="pb-value" id="pb-maker_part_no">—</span>
          </div>
          <div class="pb-row" data-field="quantity">
            <span class="pb-label">入数</span>
            <span class="pb-value" id="pb-quantity">—</span>
          </div>
          <div class="pb-row" data-field="catchcopy">
            <span class="pb-label">キャッチコピー</span>
            <span class="pb-value" id="pb-catchcopy">—</span>
          </div>
          <div class="pb-row" data-field="spec_diff">
            <span class="pb-label">仕様差分</span>
            <span class="pb-value" id="pb-spec_diff">—</span>
          </div>
        </div>
      </div>

      <!-- フレームワーク分析 -->
      <div class="dashboard-section">
        <div class="section-header">
          <span class="section-icon">📊</span>
          <span class="section-title">フレームワーク分析</span>
        </div>
        <div class="framework-badges" id="framework-badges">
          <button class="fw-badge" data-framework="3c" onclick="requestAnalysis('3c')">3C分析</button>
          <button class="fw-badge" data-framework="swot" onclick="requestAnalysis('swot')">SWOT</button>
          <button class="fw-badge" data-framework="positioning" onclick="requestAnalysis('positioning')">ポジショニング</button>
          <button class="fw-badge" data-framework="5forces" onclick="requestAnalysis('5forces')">5Forces</button>
          <button class="fw-badge" data-framework="price_map" onclick="requestAnalysis('price_map')">価格帯マップ</button>
        </div>
      </div>

      <!-- アウトプット -->
      <div class="dashboard-section">
        <div class="section-header">
          <span class="section-icon">📤</span>
          <span class="section-title">アウトプット</span>
        </div>
        <div class="output-buttons" id="output-buttons">
          <button class="output-btn" onclick="requestOutput('pim_excel')">📊 PIMデータ(Excel)</button>
          <button class="output-btn" onclick="requestOutput('translate')">🌐 英訳</button>
          <button class="output-btn" onclick="requestOutput('catalog_html')">📄 カタログHTML</button>
          <button class="output-btn" onclick="requestOutput('proposal_word')">📝 企画書(Word)</button>
        </div>
      </div>

    </div>
  </div>

  <!-- モバイル用ダッシュボードトグル -->
  <button class="mobile-dashboard-toggle" id="mobile-toggle" onclick="toggleMobileDashboard()">
    📋 PBカード
  </button>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="/static/app.js?v=20260318d"></script>
</body>
</html>
